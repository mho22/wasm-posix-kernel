name: Staging build

# Builds per-PR archives whose cache_key_sha differs from each
# package's durable [binary.<arch>] pin. Uploads them to a
# pr-<NNN>-staging pre-release for reviewers + CI to consume via the
# resolver (per-package package.toml + optional package.pr.toml
# overlay).
#
# All build steps run inside `scripts/dev-shell.sh` for a reproducible
# Rust/LLVM/Node toolchain (see flake.nix). The wrapper enters
# `nix develop --ignore-environment` so only flake-declared deps are
# visible — host /usr/bin tools that aren't in the flake won't leak in.
#
# See docs/plans/2026-04-29-pr-package-builds-design.md §4.1.
#
# Same-repo PRs only. Fork-PR support is documented as future work in
# §9.1 of the design doc.

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Serialize concurrent runs on the same PR so a slow build doesn't
# step on a fresher push's run. cancel-in-progress: true means a new
# push aborts an in-flight run — fine, the overlay is content-keyed.
concurrency:
  group: staging-build-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------
  # Decoupled package builds — staging-build's sole flow.
  #
  # Phase C Task 6 retired the monolithic legacy `build:` job that
  # previously ran the full registry walk + bulk publish + tests in
  # one runner. Today every staging build flows through the per-
  # package matrix below: preflight → toolchain-cache → matrix-build →
  # test-gate → publish → generate-index → f2-status. See
  # docs/plans/2026-05-05-decoupled-package-builds-design.md for the
  # design and docs/binary-releases.md for the consumer-side flow.
  # ---------------------------------------------------------------------


  preflight:
    # Fork-PR support is deferred (design doc §9.1). The gate below
    # keeps fork PRs from hitting a no-token `gh release view` failure
    # inside the matrix-compute step.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read           # gh release view (target tag probe)
      statuses: write          # post pending merge-gate status with helpful description
    outputs:
      library_matrix: ${{ steps.compute.outputs.library_matrix }}
      program_matrix: ${{ steps.compute.outputs.program_matrix }}
      abi: ${{ steps.compute.outputs.abi }}
      target_tag: ${{ steps.compute.outputs.target_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch musl submodule
        # compute-cache-key-sha walks the package's source/build inputs
        # to derive a deterministic hash. It does NOT need libc-test or
        # os-test (those are test inputs, not build inputs). musl is
        # pulled in case any package's [build] dependency chain reaches
        # into the sysroot recipe.
        uses: ./.github/actions/fetch-submodules
        with:
          submodules: musl

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Cache Nix store + flake eval
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Warm Nix dev shell
        run: bash scripts/dev-shell.sh true

      - name: Cache xtask build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            target
          key: preflight-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'xtask/**') }}
          restore-keys: |
            preflight-${{ runner.os }}-

      - name: Build xtask
        run: |
          bash scripts/dev-shell.sh bash -c '
            HOST_TARGET=$(rustc -vV | awk "/^host/ {print \$2}")
            cargo build --release -p xtask --target "$HOST_TARGET"
          '

      - name: Compute matrix
        id: compute
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/dev-shell.sh bash -c '
            set -euo pipefail

            ABI=$(grep -oE "ABI_VERSION: u32 = [0-9]+" crates/shared/src/lib.rs | awk "{print \$4}")
            echo "abi=$ABI" >> "$GITHUB_OUTPUT"

            # Target tag: pr-<NNN>-staging on PR runs, binaries-abi-v<N>
            # otherwise. Phase B-2 Task 10 formally flips the active
            # publish target to the undated tag; the new matrix flow can
            # already target it because it runs in parallel with the
            # legacy job and any duplicate work is idempotent (D3
            # content-hash gating below).
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              TARGET_TAG="pr-${{ github.event.pull_request.number }}-staging"
            else
              TARGET_TAG="binaries-abi-v${ABI}"
            fi
            echo "target_tag=$TARGET_TAG" >> "$GITHUB_OUTPUT"

            # One-shot fetch of existing release assets for fast lookup.
            # Falls back to empty list if the release doesn'"'"'t exist
            # yet (new ABI, new PR) — that just means everything in the
            # matrix needs to build.
            existing_assets=$(gh release view "$TARGET_TAG" --repo "${{ github.repository }}" --json assets --jq "[.assets[].name]" 2>/dev/null || echo "[]")
            echo "existing-assets:"
            echo "$existing_assets" | jq -r ".[]" | head -20
            echo "..."

            HOST_TARGET=$(rustc -vV | awk "/^host/ {print \$2}")
            library_matrix="[]"
            program_matrix="[]"

            for pkg_dir in examples/libs/*/; do
              pkg=$(basename "$pkg_dir")
              # Filter: package must have a [build] block. Today this
              # selects the recipes that own a build script and
              # naturally excludes kernel/userspace/examples/node and
              # *-source packages.
              if ! grep -q "^\[build\]" "$pkg_dir/package.toml"; then
                continue
              fi

              # Read kind so we can split into library_matrix /
              # program_matrix. Library wave runs first, programs
              # second; programs reuse the library archives via
              # package.pr.toml overlays so each library builds at
              # most once across the matrix.
              kind=$(sed -nE "s/^kind *= *\"([^\"]+)\".*/\\1/p" "$pkg_dir/package.toml" | head -1)
              case "$kind" in
                library|program) ;;
                *)
                  echo "preflight: skipping $pkg (kind=$kind, not library/program)" >&2
                  continue
                  ;;
              esac

              # Per-package arches from package.toml'"'"'s top-level
              # `arches = [...]` field (default `["wasm32"]` when
              # absent). Mirrors the filter inside
              # `xtask archive-stage`, which rejects a `(package, arch)`
              # pair whose arch isn'"'"'t in the manifest'"'"'s
              # target_arches. Assumes the single-line form
              # `arches = ["a", "b"]`; all current package.toml files
              # use that shape.
              arches=$(awk -F'"'"'[][]'"'"' '"'"'/^arches *=/ {print $2}'"'"' "$pkg_dir/package.toml" | tr -d '"'"' "'"'"' | tr '"'"','"'"' '"'"' '"'"')
              arches=${arches:-wasm32}
              for arch in $arches; do
                sha=$(cargo run --release -p xtask --target "$HOST_TARGET" --quiet -- \
                  compute-cache-key-sha --package "$pkg_dir" --arch "$arch" 2>/dev/null) || {
                  echo "preflight: skipping $pkg/$arch (compute-cache-key-sha failed)" >&2
                  continue
                }
                short=${sha:0:8}
                prefix="${pkg}-"
                suffix="-abi${ABI}-${arch}-${short}.tar.zst"
                if echo "$existing_assets" | jq -e --arg pre "$prefix" --arg suf "$suffix" \
                    "any(.[]; startswith(\$pre) and endswith(\$suf))" >/dev/null; then
                  echo "preflight: skip $pkg/$arch (sha $short already published)"
                  continue
                fi
                entry=$(jq -nc --arg pkg "$pkg" --arg arch "$arch" --arg sha "$sha" \
                  "{package: \$pkg, arch: \$arch, sha: \$sha}")
                if [ "$kind" = "library" ]; then
                  library_matrix=$(echo "$library_matrix" | jq -c --argjson e "$entry" ". + [\$e]")
                else
                  program_matrix=$(echo "$program_matrix" | jq -c --argjson e "$entry" ". + [\$e]")
                fi
              done
            done

            echo "library_matrix=$library_matrix" >> "$GITHUB_OUTPUT"
            echo "program_matrix=$program_matrix" >> "$GITHUB_OUTPUT"
            echo "preflight: library=$(echo "$library_matrix" | jq length) program=$(echo "$program_matrix" | jq length)"
            echo "library_matrix:"; echo "$library_matrix" | jq .
            echo "program_matrix:"; echo "$program_matrix" | jq .
          '

      - name: Post pending merge-gate status (instructs reviewer)
        # Branch protection on `main` requires a `merge-gate` status
        # context (posted as success by prepare-merge.yml after the
        # ready-to-ship label triggers a durable release). Without
        # this step, GitHub's merge UI shows the generic "Waiting
        # for status to be reported" — unhelpful. Posting `pending`
        # with our own description replaces that text with actionable
        # guidance. prepare-merge.yml later overwrites the same
        # context with state=success on the lockfile-bump commit.
        #
        # Skip the post if `merge-gate` is already `success` on this
        # SHA. That happens after prepare-merge force-pushes the
        # lockfile-bump commit (PR HEAD advances, synchronize event
        # triggers a fresh staging-build on the new SHA, but
        # prepare-merge has already posted success there before
        # enabling auto-merge). Without this guard, this step would
        # overwrite the success with pending and block the auto-merge
        # prepare-merge just enabled.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh api \
            "/repos/${{ github.repository }}/commits/${{ github.event.pull_request.head.sha }}/status" \
            --jq '[.statuses[] | select(.context == "merge-gate")] | .[0].state // ""')
          if [ "$existing" = "success" ]; then
            echo "merge-gate already success on ${{ github.event.pull_request.head.sha }} (likely the prepare-merge lockfile-bump commit); skipping pending post."
            exit 0
          fi
          gh api -X POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }}" \
            -f state=pending \
            -f context=merge-gate \
            -f description="Tests green. Apply the ready-to-ship label to build the durable release and merge." \
            -f target_url="https://github.com/${{ github.repository }}/blob/main/docs/plans/2026-04-29-pr-package-builds-design.md"

  toolchain-cache:
    # Same fork-PR gate as preflight + the legacy `build` job. Fork PRs
    # see this job as Skipped, consistent with current behavior.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch musl submodule
        # build-musl.sh + build-libcxx.sh consume musl/ directly. The
        # other submodules (libc-test, os-test) are test inputs and not
        # needed here.
        uses: ./.github/actions/fetch-submodules
        with:
          submodules: musl

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Cache Nix store + flake eval
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Compute cache key
        # Mirrors the key in the legacy `build` job (and prepare-merge)
        # exactly so all three caches alias. hashFiles() over the inputs
        # that affect the produced sysroot:
        #   - scripts/build-musl.sh: the musl build recipe
        #   - examples/libs/libcxx/**: the libcxx package (build script,
        #     manifest, and any helpers — replaces the deleted
        #     scripts/build-libcxx.sh)
        #   - musl-overlay/**: source patches/overrides applied on top of
        #     the musl submodule
        #   - glue/**: channel_syscall.c + headers compiled into libc.a
        id: key
        run: |
          KEY="musl-sysroot-v4-${{ runner.os }}-${{ hashFiles('scripts/build-musl.sh', 'examples/libs/libcxx/**', 'musl-overlay/**', 'glue/**') }}"
          echo "value=$KEY" >> "$GITHUB_OUTPUT"
          echo "toolchain-cache key: $KEY"

      - name: Cache musl sysroot + libc++
        uses: actions/cache@v4
        id: cache
        with:
          path: |
            sysroot
            sysroot64
          key: ${{ steps.key.outputs.value }}

      - name: Build sysroots if cache miss
        if: steps.cache.outputs.cache-hit != 'true'
        # Mirrors the legacy `build` job's "Build musl sysroot + resolve
        # libcxx" step so a cache populated here is interchangeable with
        # what the legacy path produces. libcxx is resolved via the
        # package system (examples/libs/libcxx/) and symlinked into the
        # sysroot; its build script handles the Nix-vs-Homebrew libc++
        # header path difference internally.
        run: |
          bash scripts/dev-shell.sh bash scripts/build-musl.sh
          bash scripts/dev-shell.sh bash scripts/build-musl.sh --arch wasm64posix
          bash scripts/dev-shell.sh bash -c '
            set -euo pipefail
            HOST_TARGET="$(rustc -vV | awk "/^host/ {print \$2}")"
            for arch in wasm32 wasm64; do
              cargo run -p xtask --target "$HOST_TARGET" --quiet -- \
                build-deps resolve libcxx --arch "$arch"
              prefix="$(cargo run -p xtask --target "$HOST_TARGET" --quiet -- \
                build-deps path libcxx --arch "$arch")"
              if [ "$arch" = "wasm64" ]; then sysroot="sysroot64"; else sysroot="sysroot"; fi
              mkdir -p "$sysroot/lib" "$sysroot/include/c++"
              ln -sf "$prefix/lib/libc++.a"    "$sysroot/lib/libc++.a"
              ln -sf "$prefix/lib/libc++abi.a" "$sysroot/lib/libc++abi.a"
              rm -rf "$sysroot/include/c++/v1"
              ln -sfn "$prefix/include/c++/v1" "$sysroot/include/c++/v1"
            done
          '

      - name: Pack toolchain sysroots
        # Matrix jobs fan out from this per-run artifact instead of
        # each restoring the same large sysroot cache. That keeps
        # Actions Cache traffic to one restore/save per workflow run
        # and shifts matrix fanout onto workflow artifacts.
        run: |
          tar --zstd -cf "$RUNNER_TEMP/toolchain-sysroots.tar.zst" \
            sysroot sysroot64

      - name: Upload toolchain sysroots artifact
        uses: actions/upload-artifact@v4
        with:
          name: toolchain-sysroots
          path: ${{ runner.temp }}/toolchain-sysroots.tar.zst
          retention-days: 1
          if-no-files-found: error

  # Library wave — kind=library packages build first. Each runner
  # uploads its archive as `<lib>-<arch>` so the program wave below
  # can pull them via package.pr.toml file:// overlays. This dedupes
  # library builds across the matrix: each library compiles exactly
  # once per arch, instead of once per dependent program.
  lib-matrix-build:
    needs: [preflight, toolchain-cache]
    if: needs.preflight.outputs.library_matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        include: ${{ fromJSON(needs.preflight.outputs.library_matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Compute commit-bound build provenance
        id: provenance
        run: |
          ts=$(git log -1 --format=%aI HEAD)
          echo "build-timestamp=$ts" >> "$GITHUB_OUTPUT"
          echo "build-host=${{ github.repository }}@${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Fetch musl submodule
        uses: ./.github/actions/fetch-submodules
        with:
          submodules: musl

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Cache Nix store + flake eval
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Download toolchain sysroots artifact
        uses: actions/download-artifact@v4
        with:
          name: toolchain-sysroots
          path: ${{ runner.temp }}/toolchain

      - name: Extract toolchain sysroots
        run: |
          tar --zstd -xf "$RUNNER_TEMP/toolchain/toolchain-sysroots.tar.zst"

      - name: Install host npm deps (build prereq)
        run: |
          bash scripts/dev-shell.sh bash -c '
            npm install --no-audit --no-fund
            cd host && npm install --no-audit --no-fund
          '

      - name: Resolve target package's transitive deps
        # Libraries depend on at most a handful of other libraries
        # (e.g. libpng → zlib, libcurl → openssl + zlib). Within the
        # library wave each entry source-builds its own transitive
        # libs from a cold cache; this is bounded duplicate work.
        # Eliminating it would require either topological sub-staging
        # or a cross-runner cache, both deferred follow-ups.
        run: |
          bash scripts/dev-shell.sh bash -c '
            HOST_TARGET=$(rustc -vV | awk "/^host/ {print \$2}")
            cargo run --release -p xtask --target "$HOST_TARGET" --quiet -- \
              build-deps --arch "${{ matrix.arch }}" --binaries-dir "$(pwd)/binaries" \
                resolve "${{ matrix.package }}"
          '

      - name: Build ${{ matrix.package }} (${{ matrix.arch }})
        run: |
          bash scripts/dev-shell.sh bash -c '
            HOST_TARGET=$(rustc -vV | awk "/^host/ {print \$2}")
            cargo run --release -p xtask --target "$HOST_TARGET" --quiet -- \
              archive-stage \
                --package "examples/libs/${{ matrix.package }}" \
                --arch "${{ matrix.arch }}" \
                --out "$RUNNER_TEMP/staged" \
                --build-timestamp "${{ steps.provenance.outputs.build-timestamp }}" \
                --build-host "${{ steps.provenance.outputs.build-host }}"
          '

      - name: Upload archive as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/staged/*.tar.zst
          retention-days: 7
          if-no-files-found: error

  # Program wave — kind=program packages, gated on the library wave.
  # Each runner downloads the library archives produced above and
  # materializes package.pr.toml overlays so the resolver finds each
  # library via file:// instead of source-building a fresh copy.
  matrix-build:
    needs: [preflight, toolchain-cache, lib-matrix-build]
    # !cancelled() so a partial library-wave failure (one lib failed,
    # others succeeded) doesn't cancel programs that depend only on
    # the green libs. Programs whose libs failed will fail loudly at
    # resolve time, which is the correct behavior.
    if: ${{ !cancelled() && needs.preflight.outputs.program_matrix != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        include: ${{ fromJSON(needs.preflight.outputs.program_matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Compute commit-bound build provenance
        # Use the commit author timestamp (%aI) — stable for a given SHA
        # across all wall-clock re-runs of this workflow. github.event.
        # repository.updated_at is NOT stable: it advances on every push
        # to any branch, so a re-run after an unrelated push would change
        # the embedded [compatibility].build_timestamp and shift archive
        # bytes. %aI (author date) survives rebases that don't change
        # content; %cI (committer date) does not. ISO-8601 with offset.
        id: provenance
        run: |
          ts=$(git log -1 --format=%aI HEAD)
          echo "build-timestamp=$ts" >> "$GITHUB_OUTPUT"
          echo "build-host=${{ github.repository }}@${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "provenance: build-timestamp=$ts" >&2

      - name: Fetch musl submodule
        # Even though sysroot/ + sysroot64/ are restored from cache,
        # downstream package builds (Task 4) reach into musl/ for
        # headers/sources during their configure steps. Initialize it
        # here so the cache restore that follows can layer on top.
        uses: ./.github/actions/fetch-submodules
        with:
          submodules: musl

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Cache Nix store + flake eval
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Download toolchain sysroots artifact
        uses: actions/download-artifact@v4
        with:
          name: toolchain-sysroots
          path: ${{ runner.temp }}/toolchain

      - name: Extract toolchain sysroots
        run: |
          tar --zstd -xf "$RUNNER_TEMP/toolchain/toolchain-sysroots.tar.zst"

      - name: Install host npm deps (build prereq)
        run: |
          bash scripts/dev-shell.sh bash -c '
            npm install --no-audit --no-fund
            cd host && npm install --no-audit --no-fund
          '

      - name: Download library archives from lib-matrix-build
        # Pull every library artifact produced by lib-matrix-build.
        # The pattern matches both wasm32 and wasm64 entries; the
        # downstream materialize step writes per-arch overlays so a
        # wasm32 program runner ignores wasm64 libs (and vice versa).
        # Libraries are filtered by name in lib-matrix-build's
        # `library_matrix` input; we don't need a separate filter
        # here because no other artifact uploaded earlier in the run
        # matches `*-wasm*`.
        uses: actions/download-artifact@v4
        with:
          pattern: '*-wasm*'
          path: ${{ runner.temp }}/lib-archives

      - name: Materialize library overlays
        # Write examples/libs/<lib>/package.pr.toml file:// pointers
        # for every downloaded library archive. The next step's
        # resolver finds each library via overlay → file:// → cache
        # without source-building. Each library was built exactly
        # once in lib-matrix-build above.
        run: |
          bash scripts/materialize-pr-overlays.sh "$RUNNER_TEMP/lib-archives"

      - name: Resolve target package's transitive deps
        # Target-only prerequisite resolve: invoke the resolver on
        # this matrix entry's package. With library overlays in place,
        # every library dep resolves via file:// (cache hit). Programs
        # that source-build their own transitive program deps (e.g.
        # mariadb-vfs → mariadb, dinit) still build those once here.
        run: |
          bash scripts/dev-shell.sh bash -c '
            HOST_TARGET=$(rustc -vV | awk "/^host/ {print \$2}")
            cargo run --release -p xtask --target "$HOST_TARGET" --quiet -- \
              build-deps --arch "${{ matrix.arch }}" --binaries-dir "$(pwd)/binaries" \
                resolve "${{ matrix.package }}"
          '

      - name: Build ${{ matrix.package }} (${{ matrix.arch }})
        # Per-package wrapper around the existing build-deps +
        # archive_stage internals. Builds one (package, arch) slice
        # via `xtask archive-stage` — no registry walk.
        #
        # build-timestamp + build-host are pinned to commit-bound values
        # computed in the "Compute commit-bound build provenance" step
        # above, so re-running the same SHA at any wall-clock time
        # produces byte-identical archives — load-bearing for Task 5's
        # test-gate that re-installs from artifacts. Both values are a
        # function of the commit alone; neither depends on workflow run
        # number, repository.updated_at, or any other mutable field.
        #   * build-timestamp: commit author date (%aI), ISO-8601.
        #   * build-host: <repo>@<sha> identifies the producing CI run
        #     in the embedded manifest.toml so consumers can correlate
        #     archive contents back to the workflow that emitted them.
        run: |
          bash scripts/dev-shell.sh bash -c '
            HOST_TARGET=$(rustc -vV | awk "/^host/ {print \$2}")
            cargo run --release -p xtask --target "$HOST_TARGET" --quiet -- \
              archive-stage \
                --package "examples/libs/${{ matrix.package }}" \
                --arch "${{ matrix.arch }}" \
                --out "$RUNNER_TEMP/staged" \
                --build-timestamp "${{ steps.provenance.outputs.build-timestamp }}" \
                --build-host "${{ steps.provenance.outputs.build-host }}"
          '

      - name: Upload archive as workflow artifact
        # if-no-files-found: error so a silent build that produced no
        # archive surfaces as a CI failure rather than a quiet upload
        # of nothing. Consumed by Task 5 (post-matrix test gate) and
        # Task 6 (per-file uploads to the release tag).
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/staged/*.tar.zst
          retention-days: 7
          if-no-files-found: error

  test-gate:
    # Runs the 5 test suites against the union of (matrix-built archives
    # + durable release fallback). This is the test-before-publish
    # safety property the legacy `build` job preserves today, hoisted up
    # to the matrix level: a green test-gate is what blesses the
    # subsequent publish (Task 6) of the matrix archives.
    #
    # Run even when some matrix entries failed. Per the design doc,
    # partial-matrix-failure is a real scenario the consumer side
    # handles via last-green fallback, so the green packages should
    # still be tested for the union they form with the durable release.
    # Use !cancelled() instead of always() so manual/concurrency
    # cancellation is respected and this long test job doesn't keep an
    # obsolete workflow alive.
    # The empty-matrix case (preflight produced []) is short-circuited:
    # nothing was built, nothing to test.
    needs: [preflight, toolchain-cache, lib-matrix-build, matrix-build]
    if: ${{ !cancelled() && (needs.preflight.outputs.library_matrix != '[]' || needs.preflight.outputs.program_matrix != '[]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch submodules (musl, libc-test, os-test)
        # musl       — sysroot rebuild fallback (cache restore should
        #               succeed; this is defense-in-depth for any
        #               build-script that reaches into musl/ for headers).
        # libc-test  — scripts/run-libc-tests.sh
        # os-test    — scripts/run-sortix-tests.sh
        uses: ./.github/actions/fetch-submodules
        with:
          submodules: musl libc-test os-test

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Cache Nix store + flake eval
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Download toolchain sysroots artifact
        uses: actions/download-artifact@v4
        with:
          name: toolchain-sysroots
          path: ${{ runner.temp }}/toolchain

      - name: Extract toolchain sysroots
        run: |
          tar --zstd -xf "$RUNNER_TEMP/toolchain/toolchain-sysroots.tar.zst"

      - name: Download matrix artifacts
        # Each matrix entry uploaded one artifact named "<pkg>-<arch>"
        # containing one .tar.zst. The pattern excludes the
        # toolchain-sysroots helper artifact uploaded by toolchain-cache.
        uses: actions/download-artifact@v4
        with:
          pattern: '*-wasm*'
          path: ${{ runner.temp }}/staged-archives

      - name: Install host npm deps (resolver prereq)
        # Must run before Materialize binaries: the resolver may
        # source-build a meta-package not covered by an overlay (e.g.,
        # a matrix entry that failed to build), and those scripts
        # invoke tsx with imports from host/src/. Without this,
        # fetch-binaries gets a confusing fzstd module-not-found.
        run: |
          bash scripts/dev-shell.sh bash -c '
            npm install --no-audit --no-fund
            cd host && npm install --no-audit --no-fund
          '

      - name: Materialize binaries (per-package package.pr.toml overlay)
        # Walk the downloaded matrix artifacts (lib + prog) and write
        # examples/libs/<pkg>/package.pr.toml file:// pointers via the
        # shared scripts/materialize-pr-overlays.sh. Then run
        # fetch-binaries to populate binaries/ symlinks for every
        # package (matrix-built via overlay; durable release via
        # package.toml's https:// for anything skipped by D3).
        run: |
          bash scripts/dev-shell.sh bash -c '
            set -euo pipefail
            STAGE="$RUNNER_TEMP/staged-overlay"
            bash scripts/materialize-pr-overlays.sh "$RUNNER_TEMP/staged-archives" "$STAGE"
            bash scripts/fetch-binaries.sh --allow-stale
          '

      - name: Build kernel + test programs + install host deps
        # Test prereqs not shipped in the release archives: kernel.wasm
        # is built fresh (and copied into local-binaries/ where the
        # resolver finds it ahead of binaries/), as are programs/*.wasm
        # fixtures consumed by vitest. Two npm installs: host/ for
        # vitest, repo root for tsx (used by the libc-test/POSIX/sortix
        # runners). build-rootfs.sh produces host/wasm/rootfs.vfs, which
        # NodeKernelHost loads when callers request `rootfsImage:"default"`
        # — the default for runCentralizedProgram. Without this, vitest
        # tests fail with "rootfs.vfs is missing".
        run: |
          bash scripts/dev-shell.sh bash -c '
            cargo build --release -p wasm-posix-kernel \
              -Z build-std=core,alloc \
              -Z build-std-features=panic_immediate_abort
            mkdir -p local-binaries
            cp target/wasm64-unknown-unknown/release/wasm_posix_kernel.wasm \
              local-binaries/kernel.wasm
            bash scripts/build-programs.sh
            npm install --no-audit --no-fund
            cd host && npm install --no-audit --no-fund && cd ..
            bash scripts/build-rootfs.sh
          '

      - name: Run cargo tests (kernel unit tests)
        run: |
          bash scripts/dev-shell.sh bash -c '
            HOST_TARGET=$(rustc -vV | awk "/^host/ {print \$2}")
            cargo test -p wasm-posix-kernel --target "$HOST_TARGET" --lib
          '

      - name: Run vitest (host integration tests)
        run: |
          bash scripts/dev-shell.sh bash -c '
            cd host && npx vitest run
          '

      - name: Run libc-test conformance suite
        run: |
          bash scripts/dev-shell.sh bash scripts/run-libc-tests.sh

      - name: Run Open POSIX Test Suite
        run: |
          bash scripts/dev-shell.sh bash scripts/run-posix-tests.sh

      - name: Run Sortix os-test suite
        run: |
          bash scripts/dev-shell.sh bash scripts/run-sortix-tests.sh --all

  publish:
    # Per-file uploads to the release tag (Phase B-1 Task 6).
    #
    # Gating:
    #   * needs test-gate so partial-matrix-failure doesn't ship
    #     untested archives. test-gate itself runs after failed
    #     matrix entries (but not after cancellation) against the union
    #     of (matrix-built + durable fallback), so a green test-gate
    #     blesses the matrix archives even when the durable side filled
    #     in some packages.
    #   * library_matrix and program_matrix both '[]' short-circuits
    #     the empty case (every package's sha already published;
    #     nothing new to upload).
    #
    # Tag selection mirrors the preflight: `pr-<NNN>-staging` for PR
    # runs, `binaries-abi-v<N>` for non-PR runs. Same `target_tag`
    # flows through preflight → matrix → publish so a single workflow
    # run can't disagree with itself.
    #
    # Concurrency group serializes publishes to the same tag —
    # `gh release upload --clobber` races on overlapping asset
    # overwrites (two runs uploading different bytes for the same
    # asset name within the same second can interleave HTTP requests
    # and end up with one client's body and the other's metadata).
    # Different cache_key_sha → different filename (sha is in the
    # filename), so cross-run conflicts only happen when re-running
    # the same SHA, where --clobber is byte-identical and a no-op.
    # Don't cancel in-progress: an interrupted upload leaves a
    # partial asset on the release.
    needs: [preflight, lib-matrix-build, matrix-build, test-gate]
    # `!cancelled()` is load-bearing: without it, GitHub Actions
    # implicitly applies `success()` to every `needs` entry — so when
    # one wave is empty (e.g. library_matrix == '[]' makes
    # lib-matrix-build skip), publish silently skips even though
    # everything else succeeded. The explicit success-or-skipped
    # checks on each matrix job preserve the original "don't publish
    # if a build failed" intent. Symmetric for program_matrix == '[]'.
    if: |
      !cancelled() &&
      needs.test-gate.result == 'success' &&
      (needs.lib-matrix-build.result == 'success' || needs.lib-matrix-build.result == 'skipped') &&
      (needs.matrix-build.result == 'success' || needs.matrix-build.result == 'skipped') &&
      (needs.preflight.outputs.library_matrix != '[]' || needs.preflight.outputs.program_matrix != '[]')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # gh release create/upload
    concurrency:
      group: phase-b-1-publish-${{ needs.preflight.outputs.target_tag }}
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Download matrix artifacts
        # Download package artifacts only. The pattern excludes the
        # toolchain-sysroots helper artifact uploaded by toolchain-cache.
        uses: actions/download-artifact@v4
        with:
          pattern: '*-wasm*'
          path: ${{ runner.temp }}/staged-archives

      - name: Ensure release tag exists
        # Create-vs-upload split: if the tag exists, skip create (the
        # upload step uses --clobber and is idempotent); if it doesn't,
        # create with the right shape:
        #   * `pr-<N>-staging` → --prerelease, PR-linked notes
        #   * `binaries-abi-v<N>` → durable, no --prerelease flag
        # --target pins the release to the PR head SHA so the release
        # page links back at the producing commit.
        run: |
          TAG="${{ needs.preflight.outputs.target_tag }}"
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "release $TAG exists; will upload assets with --clobber"
          else
            echo "release $TAG does not exist; creating"
            if [[ "$TAG" == pr-*-staging ]]; then
              gh release create "$TAG" \
                --repo "${{ github.repository }}" \
                --title "PR #${{ github.event.pull_request.number }} staging build" \
                --notes "Per-PR staging build. Generated by Phase B-1 publish job from PR #${{ github.event.pull_request.number }}. See docs/plans/2026-05-05-decoupled-package-builds-design.md §5.3." \
                --prerelease \
                --target "${{ github.event.pull_request.head.sha }}"
            else
              gh release create "$TAG" \
                --repo "${{ github.repository }}" \
                --title "Binaries for ABI v${{ needs.preflight.outputs.abi }}" \
                --notes "Phase B-1 per-file release. See docs/plans/2026-05-05-decoupled-package-builds-design.md §5.3." \
                --target "${{ github.sha }}"
            fi
          fi

      - name: Upload archives
        # Each matrix artifact lives in its own directory under
        # $RUNNER_TEMP/staged-archives/<pkg>-<arch>/<archive>.tar.zst.
        # Flatten with `find` and upload each .tar.zst individually
        # — the addressable unit is the per-file archive, not a
        # combined tarball (design §5.3).
        #
        # --clobber is intentional: re-runs with byte-identical bytes
        # are no-ops (same cache_key_sha → same filename → same bytes
        # under the deterministic build pipeline). Re-runs with
        # different bytes for the same filename only happen if the
        # upstream build broke determinism; --clobber correctly
        # replaces the old asset in that case.
        run: |
          TAG="${{ needs.preflight.outputs.target_tag }}"
          count=0
          while IFS= read -r f; do
            echo "uploading $(basename "$f") to $TAG"
            gh release upload "$TAG" "$f" --clobber --repo "${{ github.repository }}"
            count=$((count + 1))
          done < <(find "$RUNNER_TEMP/staged-archives" -name '*.tar.zst' -print | sort)
          echo "publish: uploaded $count archive(s) to $TAG"

      - name: Prune stale staging-release archives
        # Defensive cleanup of accumulated state on `pr-<N>-staging`.
        # `--clobber` only overwrites assets with identical filenames,
        # so cross-ABI carry-overs (filename declares old `abi<N>` after
        # main bumps `ABI_VERSION`) and per-(name,arch) sha duplicates
        # (cache_key changed → new filename suffix) survive each run
        # and break the downstream `xtask build-index` step. The script
        # is a no-op for non-`pr-*-staging` tags.
        # See scripts/prune-staging-release.sh for the full rationale.
        run: |
          bash scripts/prune-staging-release.sh \
            "${{ needs.preflight.outputs.target_tag }}" \
            "${{ needs.preflight.outputs.abi }}" \
            "${{ github.repository }}"

  generate-index:
    # Phase B-1 Task 7 — index.toml generation + upload.
    #
    # Runs after `publish` so every per-file archive has landed on the
    # release tag before we enumerate it. Lives in its own job (rather
    # than appended to `publish` as a final step) to keep the publish
    # job focused on archive uploads — index.toml generation reads back
    # from the tag, so it's a logically distinct concern.
    #
    # Concurrency group: same as `publish` so a re-run racing against
    # a still-uploading earlier run waits its turn. Without this, two
    # back-to-back pushes could both download the release assets at
    # different points in the publish sequence and emit
    # mutually-inconsistent index.tomls.
    #
    # Future consumers of the source-manifest format (resolver,
    # third-party catalog browsers per the design's software-source
    # concept in §4) read this file for discovery without enumerating
    # release assets via the GitHub API.
    needs: [preflight, publish]
    # `!cancelled()` is load-bearing: the implicit `success()` gate
    # propagates a skip through the DAG, so even when `publish` ran
    # successfully (via its own `!cancelled()` override after a
    # skipped `lib-matrix-build`), the skip-taint still poisons this
    # job's default gate. The explicit `result == 'success'` check
    # preserves the original "only run if publish succeeded" intent.
    if: |
      !cancelled() &&
      needs.publish.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # gh release upload index.toml
    concurrency:
      group: phase-b-1-publish-${{ needs.preflight.outputs.target_tag }}
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Cache Nix store + flake eval
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Cache xtask build
        # Aliases the preflight job's xtask cache key so the build
        # below is a fast cache hit when nothing in xtask/ changed.
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            target
          key: preflight-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'xtask/**') }}
          restore-keys: |
            preflight-${{ runner.os }}-

      - name: Build xtask
        run: |
          bash scripts/dev-shell.sh bash -c '
            HOST_TARGET=$(rustc -vV | awk "/^host/ {print \$2}")
            cargo build --release -p xtask --target "$HOST_TARGET"
          '

      - name: Compute commit-bound generated_at
        # Use the commit author timestamp (%aI) — same provenance source
        # the matrix-build step uses for `[compatibility].build_timestamp`.
        # Pinning to a commit-bound value keeps `index.toml` byte-stable
        # across wall-clock re-runs of this workflow on the same SHA;
        # otherwise re-running generate-index would produce a different
        # index.toml byte-for-byte (mostly harmless, but wasteful).
        id: provenance
        run: |
          ts=$(git log -1 --format=%aI HEAD)
          echo "generated-at=$ts" >> "$GITHUB_OUTPUT"
          echo "generated_at: $ts" >&2

      - name: Download all archives from release
        # Restricted to `*.tar.zst` so a previous run's index.toml (if
        # any) doesn't get pulled into the input set. The current run's
        # index.toml hasn't been uploaded yet — defensive filter for
        # the re-run / partial-publish case.
        run: |
          TAG="${{ needs.preflight.outputs.target_tag }}"
          mkdir -p "$RUNNER_TEMP/index-archives"
          gh release download "$TAG" --repo "${{ github.repository }}" --pattern '*.tar.zst' --dir "$RUNNER_TEMP/index-archives"
          echo "downloaded $(find "$RUNNER_TEMP/index-archives" -name '*.tar.zst' | wc -l) archive(s) for indexing"

      - name: Generate index.toml
        run: |
          TAG="${{ needs.preflight.outputs.target_tag }}"
          ABI="${{ needs.preflight.outputs.abi }}"
          bash scripts/dev-shell.sh bash -c '
            HOST_TARGET=$(rustc -vV | awk "/^host/ {print \$2}")
            cargo run --release -p xtask --target "$HOST_TARGET" --quiet -- \
              build-index \
                --abi "'"$ABI"'" \
                --generator "wasm-posix-kernel CI @ ${{ github.sha }}" \
                --archives-dir "'"$RUNNER_TEMP"'/index-archives" \
                --out "'"$RUNNER_TEMP"'/index.toml" \
                --generated-at "${{ steps.provenance.outputs.generated-at }}"
          '
          echo "--- index.toml head ---"
          head -30 "$RUNNER_TEMP/index.toml"

      - name: Upload index.toml to release
        # --clobber: re-runs with a deterministic generated_at +
        # identical archive set produce byte-identical index.toml,
        # so re-uploading is a no-op. A re-run with a changed archive
        # set legitimately replaces the old index.toml with the new
        # one, which is the correct behavior — consumers always read
        # the latest index.toml on the tag.
        run: |
          TAG="${{ needs.preflight.outputs.target_tag }}"
          gh release upload "$TAG" "$RUNNER_TEMP/index.toml" --clobber --repo "${{ github.repository }}"
          echo "uploaded index.toml to $TAG"

  f2-status:
    # Phase B-2 Task 1 — F2 sticky PR-comment bot.
    #
    # Aggregates the narrowed matrix from preflight against the release
    # asset list (post-publish, post-generate-index) into a flat
    # publish-status.json, uploads it as a workflow artifact, and
    # posts/edits a sticky PR comment surfacing per-package outcomes
    # ("X built, Y failed").
    #
    # `if: always()` is intentional: the bot's whole purpose is to
    # surface partial failures in matrix-build. We still skip when
    # the narrowed matrix is empty (nothing was attempted; nothing
    # to report). For B-2, only matrix-included entries are
    # reported — `cached-skip` (entries the preflight gate filtered
    # out) is not surfaced. Follow-up if reviewers want full coverage.
    #
    # Joins the publish concurrency group so the comment can't race a
    # concurrent re-run on the same target tag. The narrow window where
    # this matters: workflow_dispatch or "re-run all jobs" on a still-
    # current PR (the workflow-level `cancel-in-progress: true` already
    # eliminates the common-case quick-push race). cancel-in-progress is
    # false here because aborting an in-flight comment edit is worse than
    # waiting one more comment-edit's worth of time.
    needs: [preflight, lib-matrix-build, matrix-build, publish, generate-index]
    if: always() && (needs.preflight.outputs.library_matrix != '[]' || needs.preflight.outputs.program_matrix != '[]')
    runs-on: ubuntu-latest
    concurrency:
      group: phase-b-1-publish-${{ needs.preflight.outputs.target_tag }}
      cancel-in-progress: false
    permissions:
      pull-requests: write   # post/edit PR comment
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Compute publish-status.json
        id: status
        run: |
          set -euo pipefail
          TAG="${{ needs.preflight.outputs.target_tag }}"
          ABI="${{ needs.preflight.outputs.abi }}"
          # f2-status walks the union of library + program matrices
          # to decide per-entry status (built vs. failed); merge the
          # two into a single array so the downstream loop stays
          # uniform.
          LIB_M='${{ needs.preflight.outputs.library_matrix }}'
          PROG_M='${{ needs.preflight.outputs.program_matrix }}'
          MATRIX=$(jq -nc --argjson l "$LIB_M" --argjson p "$PROG_M" '$l + $p')

          # Currently published assets in the release (post-publish,
          # post-generate-index). Falls back to [] if the release
          # doesn't exist (matrix all failed early, nothing published).
          existing=$(gh release view "$TAG" --repo "${{ github.repository }}" \
            --json assets --jq '[.assets[].name]' 2>/dev/null || echo '[]')

          # For each matrix entry, decide status by checking whether
          # the expected canonical archive name is in the release.
          # If yes: built. If no: failed (matrix-build for that entry
          # failed). For failed entries, look up a prior archive for
          # the same (pkg, arch) — the short-sha tail of that name is
          # the previous_sha (last green).
          #
          # NOTE: process substitution (< <(...)) NOT a pipe — under
          # non-interactive bash, `cmd | while` runs the loop body in a
          # subshell, losing mutations to packages_json on each iteration.
          packages_json='[]'
          while IFS= read -r entry; do
            pkg=$(echo "$entry" | jq -r .package)
            arch=$(echo "$entry" | jq -r .arch)
            sha=$(echo "$entry" | jq -r .sha)
            short8="${sha:0:8}"

            # Canonical archive name: <pkg>-<ver>-rev<N>-abi<N>-<arch>-<short8>.tar.zst.
            # The (pkg, arch, short8) triple uniquely identifies an entry;
            # version + revision live in the package manifest and don't
            # need to round-trip through this aggregation.
            if echo "$existing" | jq -e --arg pre "${pkg}-" --arg suf "-abi${ABI}-${arch}-${short8}.tar.zst" \
                'any(.[]; startswith($pre) and endswith($suf))' >/dev/null; then
              entry_json=$(jq -nc --arg n "$pkg" --arg a "$arch" --arg s "$sha" \
                '{name:$n, arch:$a, status:"built", sha:$s}')
            else
              # Find a prior archive for the same (pkg, arch) — different sha.
              # Best-effort; if multiple shas exist (shouldn't, but
              # defensively), jq picks the first.
              prev_short=$(echo "$existing" | jq -r --arg pre "${pkg}-" --arg arch_part "-abi${ABI}-${arch}-" \
                '[.[] | select(startswith($pre) and contains($arch_part))] | .[0] // ""' \
                | sed -nE 's/.*-([a-f0-9]{8})\.tar\.zst$/\1/p')
              if [ -n "$prev_short" ]; then
                entry_json=$(jq -nc --arg n "$pkg" --arg a "$arch" --arg p "$prev_short" \
                  '{name:$n, arch:$a, status:"failed", previous_sha:$p}')
              else
                entry_json=$(jq -nc --arg n "$pkg" --arg a "$arch" \
                  '{name:$n, arch:$a, status:"failed"}')
              fi
            fi
            packages_json=$(echo "$packages_json" | jq -c --argjson e "$entry_json" '. + [$e]')
          done < <(echo "$MATRIX" | jq -c '.[]')

          jq -nc --argjson abi "$ABI" --arg tag "$TAG" --argjson pkgs "$packages_json" \
            '{abi_version:$abi, release_tag:$tag, packages:$pkgs}' \
            > publish-status.json

          echo "--- publish-status.json ---"
          jq . publish-status.json

          # Stash compact JSON in step output for the comment script.
          # Use a heredoc-style multi-line output to avoid quoting issues
          # with embedded special characters in package names / shas.
          json=$(jq -c . publish-status.json)
          {
            echo "json<<__EOF__"
            echo "$json"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Upload publish-status.json
        uses: actions/upload-artifact@v4
        with:
          name: publish-status
          path: publish-status.json
          retention-days: 30
          if-no-files-found: error

      - name: Post or edit sticky PR comment
        # Skipped on non-PR triggers (workflow_dispatch from the
        # force-rebuild flow, etc.) — those still get the artifact
        # but have no PR to comment on.
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          STATUS_JSON: ${{ steps.status.outputs.json }}
        with:
          script: |
            const status = JSON.parse(process.env.STATUS_JSON);
            const marker = '<!-- phase-b-status -->';
            const total = status.packages.length;
            const built = status.packages.filter(p => p.status === 'built').length;
            const failed = status.packages.filter(p => p.status === 'failed').length;

            const rows = status.packages.map(p => {
              const sha = p.sha
                ? `\`${p.sha.slice(0, 8)}\``
                : (p.previous_sha ? `\`(prev ${p.previous_sha})\`` : '—');
              return `| ${p.name} | ${p.arch} | ${p.status} | ${sha} |`;
            }).join('\n');

            const body = [
              marker,
              `## Phase B-1 matrix build status — \`${status.release_tag}\``,
              '',
              `ABI v${status.abi_version}. **${built} built**, **${failed} failed**, ${total} total.`,
              '',
              '| Package | Arch | Status | Sha |',
              '| --- | --- | --- | --- |',
              rows,
              '',
              '<sub>Auto-generated; replaced on each push. Raw data in the `publish-status` workflow artifact.</sub>',
            ].join('\n');

            const issue_number = context.issue.number;
            const { owner, repo } = context.repo;

            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              console.log(`Updated sticky comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
              console.log('Created new sticky comment');
            }
