name: Force rebuild

# Manually-triggered escape hatch for refreshing the durable binaries
# release. Runs the package resolver with `--force-rebuild` flags so
# the named manifests source-build instead of resolving from the
# content-addressed cache or `[binary].archive_url`. Use this when
# the cache_key composition is suspected incomplete (e.g., a
# toolchain pin was bumped without invalidating package archives) and
# you want to confirm the published archives match a fresh source
# build.
#
# Inputs (rendered in the GitHub Actions "Run workflow" modal):
#   packages       — `all` (default) or a comma-separated list of
#                    package.toml names (e.g. `php,mariadb`). `all`
#                    rebuilds every library + program manifest in
#                    the registry.
#   arches         — comma-separated subset of `wasm32,wasm64`
#                    (default: both). Manifests whose `target_arches`
#                    don't include a requested arch are silently
#                    skipped per the existing stage-release behavior.
#   ref            — git ref to build from. Defaults to the branch the
#                    workflow was triggered from (`github.ref_name`),
#                    so dispatching from a PR branch tests the PR's
#                    sources rather than silently building `main`. Set
#                    to a specific tag/sha for a one-shot rebuild from
#                    history.
#   skip_tests     — when true, publishes without running the 5 test
#                    suites. Defaults to false (tests must pass before
#                    publish). workflow_dispatch is maintainer-only,
#                    so this is treated as deliberate.
#   bump_lockfile  — when true (default), opens a PR that bumps
#                    binaries.lock to the new release. Disable for
#                    diagnostic rebuilds where you only want to
#                    compare archives without changing what main
#                    consumes. The bump PR carries its own
#                    `merge-gate` success status (set by this
#                    workflow), so it can auto-merge without going
#                    through prepare-merge.yml — which would
#                    otherwise cut a second redundant durable
#                    release.
#
# See docs/binary-releases.md for context. The durable-release lock
# step below is shared with prepare-merge, so force-rebuild and
# prepare-merge can't both publish a durable release at the same
# moment. Avoid workflow-level concurrency here because GitHub Actions
# keeps only one pending run per group and cancels/replaces additional
# queued runs.

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Comma-separated package names, or `all`. Names match package.toml entries (e.g. php,mariadb).'
        required: false
        default: 'all'
        type: string
      arches:
        description: 'Comma-separated arch list. Subset of wasm32,wasm64.'
        required: false
        default: 'wasm32,wasm64'
        type: string
      ref:
        description: 'Git ref to build from. Empty = the branch the workflow was triggered from.'
        required: false
        default: ''
        type: string
      skip_tests:
        description: 'Publish without running the 5 test suites. Use with care — durable releases normally gate on tests.'
        required: false
        default: false
        type: boolean
      bump_lockfile:
        description: 'After publish, open a PR bumping binaries.lock to the new release tag. Disable for diagnostic-only rebuilds.'
        required: false
        default: true
        type: boolean

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # release create/upload + push bot branch
      pull-requests: write     # open + auto-merge bump PR
      statuses: write          # post merge-gate status on bump PR
    env:
      INPUT_PACKAGES: ${{ inputs.packages }}
      INPUT_ARCHES: ${{ inputs.arches }}
      INPUT_REF: ${{ inputs.ref != '' && inputs.ref || github.ref_name }}
      INPUT_SKIP_TESTS: ${{ inputs.skip_tests }}
      INPUT_BUMP_LOCKFILE: ${{ inputs.bump_lockfile }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Resolve via env var so a single source of truth (INPUT_REF)
          # carries the empty-input fallback into both checkout and the
          # downstream gh-cli calls (lockfile-bump PR's --base).
          ref: ${{ env.INPUT_REF }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for durable release turn
        run: bash .github/scripts/durable-release-lock.sh acquire

      - name: Fetch submodules (musl, libc-test, os-test)
        # See staging-build.yml for the SSH→HTTPS rewrite rationale.
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --depth 1 musl libc-test os-test

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v18

      - name: Cache Nix store + flake eval
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Warm Nix dev shell
        run: bash scripts/dev-shell.sh true

      - name: Cache resolver + cargo target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/wasm-posix-kernel
            target
          key: force-rebuild-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'examples/libs/**/package.toml') }}
          restore-keys: |
            force-rebuild-${{ runner.os }}-
            prepare-merge-${{ runner.os }}-
            staging-build-${{ runner.os }}-

      - name: Cache musl sysroot + libc++
        uses: actions/cache@v4
        id: cache-sysroot
        with:
          path: |
            sysroot
            sysroot64
          key: musl-sysroot-v3-${{ runner.os }}-${{ hashFiles('scripts/build-musl.sh', 'scripts/build-libcxx.sh', 'musl-overlay/**', 'glue/**') }}

      - name: Build musl sysroot + libc++ (wasm32 + wasm64)
        if: steps.cache-sysroot.outputs.cache-hit != 'true'
        # See staging-build.yml.
        run: |
          bash scripts/dev-shell.sh bash scripts/build-musl.sh
          bash scripts/dev-shell.sh bash scripts/build-musl.sh --arch wasm64posix
          bash scripts/dev-shell.sh bash -c '
            src=""
            for cand in "$LLVM_PREFIX/include/c++/v1" "$LLVM_PREFIX/share/libc++/v1"; do
              if [ -f "$cand/__config" ] || [ -f "$cand/iostream" ]; then
                src="$cand"; break
              fi
            done
            if [ -z "$src" ]; then
              echo "ERROR: cant locate libc++ headers under $LLVM_PREFIX" >&2
              exit 1
            fi
            echo "installing libc++ headers from $src"
            for arch_dir in sysroot sysroot64; do
              if [ ! -f "$arch_dir/include/c++/v1/__config" ]; then
                mkdir -p "$arch_dir/include/c++/v1"
                cp -RL "$src"/* "$arch_dir/include/c++/v1/"
                chmod -R u+w "$arch_dir/include/c++/v1/"
                cs="$arch_dir/include/c++/v1/__config_site"
                if [ -f "$cs" ]; then
                  sed -i "s/_LIBCPP_HAS_MUSL_LIBC 0/_LIBCPP_HAS_MUSL_LIBC 1/" "$cs"
                  sed -i "s/_LIBCPP_HAS_THREAD_API_PTHREAD 0/_LIBCPP_HAS_THREAD_API_PTHREAD 1/" "$cs"
                fi
              fi
            done
          '
          bash scripts/dev-shell.sh bash scripts/build-libcxx.sh
          bash scripts/dev-shell.sh bash scripts/build-libcxx.sh --arch wasm64

      - name: Compute durable release tag
        id: tag
        run: |
          ABI=$(grep -oE 'ABI_VERSION: u32 = [0-9]+' crates/shared/src/lib.rs | awk '{print $4}')
          DATE=$(date -u +%Y-%m-%d)
          BASE="binaries-abi-v${ABI}-${DATE}"
          TAG="$BASE"
          SEQ=2
          while gh release view "$TAG" --repo ${{ github.repository }} >/dev/null 2>&1; do
            TAG="${BASE}-${SEQ}"
            SEQ=$((SEQ + 1))
          done
          echo "abi=$ABI" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Install host npm deps (build prereq)
        # Some package builds invoke node scripts that import from
        # host/src/ — e.g. shell's build-shell-vfs-image.ts pulls in
        # host/src/vfs/zip.ts (→ `fflate`). tsx resolves modules
        # relative to the importing file, so without host/node_modules
        # populated the build dies with "Cannot find package 'fflate'".
        # Done before stage-release so source-rebuilds don't fail this
        # way; the test-suite step further down does its own install
        # too (idempotent, fast cache hit on second run).
        run: |
          bash scripts/dev-shell.sh bash -c '
            npm install --no-audit --no-fund
            cd host && npm install --no-audit --no-fund
          '

      - name: Stage durable release (force-rebuild)
        # Translate the comma-separated `packages` input into one
        # `--force-rebuild-all` or N `--force-rebuild <name>` flags.
        # `arches` is split the same way. Inputs are read via env to
        # keep them out of the bash-parsed source after expansion
        # (defence against odd characters in input strings).
        run: |
          force_args=()
          if [ "$INPUT_PACKAGES" = "all" ]; then
            force_args+=(--force-rebuild-all)
          else
            IFS=',' read -ra names <<< "$INPUT_PACKAGES"
            for n in "${names[@]}"; do
              # Trim leading/trailing whitespace (tolerant of `a, b, c`).
              n="${n#"${n%%[![:space:]]*}"}"
              n="${n%"${n##*[![:space:]]}"}"
              [ -n "$n" ] && force_args+=(--force-rebuild "$n")
            done
          fi
          arch_args=()
          IFS=',' read -ra arches_arr <<< "$INPUT_ARCHES"
          for a in "${arches_arr[@]}"; do
            a="${a#"${a%%[![:space:]]*}"}"
            a="${a%"${a##*[![:space:]]}"}"
            [ -n "$a" ] && arch_args+=(--arch "$a")
          done
          # `--allow-failure texlive`: TexLive's bundled web2c
          # auto-generates `pmpost`'s C sources from `.w` files (the
          # WEB literate-programming format), and pmpmathbinary.c
          # hard-`#include`s <gmp.h> regardless of `--disable-mp /
          # --disable-ptex / --disable-uptex`. Until that's untangled
          # (likely needs `pkgs.gmp/mpfr/cairo` in flake plus
          # `--with-system-gmp=yes` for both Phase 1 host and Phase
          # 2 cross builds, with matching wasm32 ports of those
          # libs), keep texlive's source-build red but un-gating —
          # warn instead of fail. Track in
          # docs/package-management-future-work.md. Drop this flag
          # once texlive can source-build under
          # `nix develop --ignore-environment`.
          mkdir -p /tmp/durable
          bash scripts/dev-shell.sh \
            scripts/stage-release.sh \
              --out /tmp/durable \
              --tag "${{ steps.tag.outputs.tag }}" \
              --allow-failure texlive \
              "${arch_args[@]}" \
              "${force_args[@]}"

      - name: Place binaries/ symlinks pointing at the fresh staged archives
        # Tests must validate the freshly-built artifacts in
        # /tmp/durable, not the prior release's binaries. Stage-release
        # has populated the resolver cache and produced .tar.zst
        # archives under /tmp/durable, but binary-resolver.ts reads
        # binaries/ + local-binaries/, neither of which stage-release
        # touches. Run install-release against /tmp/durable's
        # manifest.json with file:// archive-base; --binaries-dir
        # places binaries/programs/<arch>/<x> symlinks pointing at the
        # cache canonical paths (which now hold the fresh bytes).
        #
        # No --force-mirror: install-release skips the local-binaries/
        # mirror on cache-hit, and that's fine — binary-resolver.ts
        # falls through to binaries/ when local-binaries/ has no entry,
        # and binaries/ symlinks are placed unconditionally when
        # --binaries-dir is set. Mirroring to local-binaries/ would
        # just duplicate bytes into a path the resolver doesn't reach
        # for these programs.
        if: ${{ !inputs.skip_tests }}
        run: |
          HOST_TARGET="$(rustc -vV | awk '/^host/ {print $2}')"
          bash scripts/dev-shell.sh \
            cargo run -p xtask --target "$HOST_TARGET" --quiet -- install-release \
              --manifest /tmp/durable/manifest.json \
              --archive-base "file:///tmp/durable" \
              --binaries-dir binaries

      - name: Build kernel + test programs + install host deps (test prereqs)
        # kernel.wasm and userspace.wasm aren't in the durable release
        # (per stage-release.sh's header), so they're built locally
        # only when tests need them.
        #
        # `npx playwright install chromium` downloads the headless-shell
        # browser binary into ~/.cache/ms-playwright/. The
        # examples/wordpress/test/wordpress-site-editor.test.ts E2E test
        # invokes `chromium.launch()` directly (not via `npx playwright
        # test` runner), so the browser must be present before vitest
        # runs — `npm install` alone only fetches the @playwright/test
        # NPM package, not the browser bundles.
        if: ${{ !inputs.skip_tests }}
        run: |
          bash scripts/dev-shell.sh bash -c '
            cargo build --release -p wasm-posix-kernel \
              -Z build-std=core,alloc \
              -Z build-std-features=panic_immediate_abort
            mkdir -p local-binaries
            cp target/wasm64-unknown-unknown/release/wasm_posix_kernel.wasm \
              local-binaries/kernel.wasm
            bash scripts/build-programs.sh
            npm install --no-audit --no-fund
            cd host && npm install --no-audit --no-fund
            cd .. && npx --prefix host playwright install chromium
          '

      - name: Run cargo + vitest tests
        if: ${{ !inputs.skip_tests }}
        run: |
          bash scripts/dev-shell.sh bash -c '
            HOST_TARGET=$(rustc -vV | awk "/^host/ {print \$2}")
            cargo test -p wasm-posix-kernel --target "$HOST_TARGET" --lib
            cd host && npx vitest run
          '

      - name: Run libc-test conformance suite
        if: ${{ !inputs.skip_tests }}
        run: |
          bash scripts/dev-shell.sh bash scripts/run-libc-tests.sh

      - name: Run Open POSIX Test Suite
        if: ${{ !inputs.skip_tests }}
        run: |
          bash scripts/dev-shell.sh bash scripts/run-posix-tests.sh

      - name: Run Sortix os-test suite
        if: ${{ !inputs.skip_tests }}
        run: |
          bash scripts/dev-shell.sh bash scripts/run-sortix-tests.sh --all

      - name: Publish durable release
        # Reached only after tests pass (or skip_tests=true). Tests
        # before publish (vs prepare-merge.yml's publish-then-test) is
        # the safer ordering for a manual rebuild — we don't want
        # orphaned releases scattered around when force-rebuild is
        # used to investigate a suspected cache problem.
        run: |
          bash scripts/dev-shell.sh \
            scripts/publish-release.sh \
              --tag "${{ steps.tag.outputs.tag }}" \
              --staging /tmp/durable

      - name: Open lockfile-bump PR
        if: ${{ inputs.bump_lockfile }}
        id: bump
        run: |
          # Branch name encodes the new tag for human readability.
          BRANCH="bot/bump-lockfile-${{ steps.tag.outputs.tag }}"

          git config user.name "wasm-posix-binaries-bot"
          git config user.email "noreply@anthropic.com"
          git checkout -b "$BRANCH"

          SHA=$(shasum -a 256 /tmp/durable/manifest.json | awk '{print $1}')
          jq -n \
            --argjson abi ${{ steps.tag.outputs.abi }} \
            --arg tag "${{ steps.tag.outputs.tag }}" \
            --arg sha "$SHA" \
            '{abi_version: $abi, release_tag: $tag, manifest_sha256: $sha}' \
            > binaries.lock

          git add binaries.lock
          git commit -m "chore(binaries): bump lockfile to ${{ steps.tag.outputs.tag }}

          Generated by .github/workflows/force-rebuild.yml. Force-rebuild
          packages: $INPUT_PACKAGES (arches: $INPUT_ARCHES). Triggered by
          ${{ github.event.sender.login }}."

          git push -u origin "$BRANCH"
          NEW_SHA=$(git rev-parse HEAD)

          # Open PR. Skip prepare-merge by NOT applying ready-to-ship.
          # Base = the resolved ref we built from (INPUT_REF), so a
          # PR-branch dispatch lands the bump on that PR's branch
          # rather than punting to main.
          gh pr create \
            --repo ${{ github.repository }} \
            --base "$INPUT_REF" \
            --head "$BRANCH" \
            --title "chore(binaries): bump lockfile to ${{ steps.tag.outputs.tag }}" \
            --body "Auto-generated by .github/workflows/force-rebuild.yml.

          Force-rebuilt packages: \`$INPUT_PACKAGES\` (arches: \`$INPUT_ARCHES\`).
          Triggered by @${{ github.event.sender.login }}.

          Tests: $([ \"$INPUT_SKIP_TESTS\" = \"true\" ] && echo \"SKIPPED (skip_tests=true)\" || echo \"all 5 suites passed before publish\").

          The \`merge-gate\` status is posted as success by this workflow — the durable release was published only after tests passed (or after the maintainer chose to skip), so no further verification is needed before merge."

          PR_NUMBER=$(gh pr view "$BRANCH" --repo ${{ github.repository }} --json number -q .number)
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "new_sha=$NEW_SHA" >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Set merge-gate status on bump PR
        # Required for branch-protection-on-main with the merge-gate
        # check. Symmetric with prepare-merge.yml's post-publish
        # status step.
        if: ${{ inputs.bump_lockfile }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/statuses/${{ steps.bump.outputs.new_sha }}" \
            -f state=success \
            -f context=merge-gate \
            -f description="force-rebuild published ${{ steps.tag.outputs.tag }} (tests: $([ "$INPUT_SKIP_TESTS" = "true" ] && echo skipped || echo passed))"

      - name: Enable squash auto-merge on bump PR
        if: ${{ inputs.bump_lockfile }}
        run: |
          gh pr merge "${{ steps.bump.outputs.pr_number }}" \
            --repo ${{ github.repository }} \
            --auto --squash

      - name: Release durable release turn
        if: always()
        run: bash .github/scripts/durable-release-lock.sh release
