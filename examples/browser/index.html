<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Programs — wasm-posix-kernel</title>
  <link rel="stylesheet" href="./lib/layout.css">
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-title">Demos</div>
    <a href="/" aria-current="page">Simple Programs</a>
    <a href="/pages/nginx/">nginx</a>
    <a href="/pages/php/">PHP CLI</a>
    <a href="/pages/nginx-php/">nginx + PHP-FPM</a>
    <a href="/pages/mariadb/">MariaDB</a>
    <a href="/pages/wordpress/">WordPress (LEMP-but-SQLite)</a>
    <a href="/pages/lamp/">WordPress (LEMP)</a>
    <a href="/pages/shell/">Shell</a>
    <a href="/pages/doom/">DOOM</a>
  </nav>
  <div class="main">
    <div class="main-header">
      <h1>Simple Programs</h1>
      <p class="subtitle">C programs running inside a POSIX kernel compiled to WebAssembly</p>
      <div class="controls">
        <select id="program">
          <option value="hello">hello</option>
          <option value="malloc">malloc</option>
          <option value="strings">strings</option>
          <option value="math">math</option>
          <option value="snprintf">snprintf</option>
          <option value="environ">environ</option>
          <option value="fprintf">fprintf</option>
          <option value="files">files</option>
          <option value="dirs">dirs</option>
          <option value="spawn-smoke">spawn-smoke</option>
        </select>
        <button id="run">Run</button>
      </div>
    </div>
    <div class="preview-area">
      <div class="output-area">
        <pre id="output"></pre>
        <!-- Surfaced for the non-forking-spawn regression test. After spawn-smoke
             runs, main.ts sets data-fork-count to the kernel's per-process fork
             counter — Playwright reads it to assert SYS_SPAWN didn't fall back
             to fork. -->
        <div id="fork-count-debug" data-fork-count="" style="display: none"></div>
      </div>
    </div>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
