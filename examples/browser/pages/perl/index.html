<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perl — wasm-posix-kernel</title>
  <link rel="stylesheet" href="../../lib/layout.css">
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-title">Demos</div>
    <a href="/">Simple Programs</a>
    <a href="/pages/nginx/">nginx</a>
    <a href="/pages/php/">PHP CLI</a>
    <a href="/pages/nginx-php/">nginx + PHP-FPM</a>
    <a href="/pages/mariadb/">MariaDB</a>
    <a href="/pages/redis/">Redis</a>
    <a href="/pages/wordpress/">WordPress (LEMP-but-SQLite)</a>
    <a href="/pages/lamp/">WordPress (LEMP)</a>
    <a href="/pages/shell/">Shell</a>
    <a href="/pages/python/">Python</a>
    <a href="/pages/perl/" aria-current="page">Perl</a>

    <a href="/pages/doom/">DOOM</a>
    <a href="/pages/scummvm/">ScummVM</a>
  </nav>
  <div class="main">
    <div class="main-header">
      <h1>Perl on wasm-posix-kernel</h1>
      <p class="subtitle">Perl 5.40.3 running inside a POSIX kernel compiled to WebAssembly</p>
      <div class="mode-toggle">
        <button id="mode-interactive" class="active">REPL</button>
        <button id="mode-batch">Script</button>
      </div>
      <div id="status" class="status" style="display:none"></div>
    </div>
    <div class="preview-area">
      <!-- Interactive REPL mode -->
      <div id="interactive-view" class="view-panel">
        <div class="controls" style="padding:0.75rem;flex-shrink:0">
          <button id="start">Start Perl REPL</button>
          <button id="stop" disabled>Stop</button>
          <select id="snippets">
            <option value="">-- Insert Snippet --</option>
            <option value="hello">print "Hello, World!\n"</option>
            <option value="version">print "Perl $^V\n"</option>
            <option value="array">my @a = (1..5); print join(", ", @a), "\n"</option>
            <option value="hash">my %h = (a => 1, b => 2); print "$_=$h{$_} " for sort keys %h; print "\n"</option>
            <option value="regex">"Hello World" =~ /(\w+)/g; print "Match: $1\n"</option>
          </select>
        </div>
        <div class="terminal-area">
          <div id="terminal"></div>
        </div>
      </div>
      <!-- Script mode -->
      <div id="batch-view" class="view-panel hidden">
        <div class="controls" style="padding:0.75rem;flex-shrink:0">
          <select id="examples">
            <option value="">-- Load Example --</option>
            <option value="hello">Hello World</option>
            <option value="regex">Regular Expressions</option>
            <option value="hash">Hashes & Data</option>
            <option value="file">File I/O</option>
            <option value="functional">Map/Grep/Sort</option>
            <option value="oop">OOP (Packages)</option>
          </select>
          <button id="run">Run</button>
          <span class="hint">Ctrl+Enter to run</span>
        </div>
        <div class="batch-panel">
          <div>
            <h3>Perl Code</h3>
            <textarea id="code">use strict;
use warnings;

my @numbers = (1..20);
my @squares = map { $_ ** 2 } @numbers;
my @evens = grep { $_ % 2 == 0 } @squares;

print "Squares of 1..20:\n";
print join(", ", @squares), "\n\n";

print "Even squares:\n";
print join(", ", @evens), "\n";
</textarea>
          </div>
          <div>
            <h3>Output</h3>
            <pre id="batch-output"></pre>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
