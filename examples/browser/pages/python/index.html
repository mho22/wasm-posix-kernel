<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Python — wasm-posix-kernel</title>
  <link rel="stylesheet" href="../../lib/layout.css">
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-title">Demos</div>
    <a href="/">Simple Programs</a>
    <a href="/pages/nginx/">nginx</a>
    <a href="/pages/php/">PHP CLI</a>
    <a href="/pages/nginx-php/">nginx + PHP-FPM</a>
    <a href="/pages/mariadb/">MariaDB</a>
    <a href="/pages/redis/">Redis</a>
    <a href="/pages/wordpress/">WordPress (LEMP-but-SQLite)</a>
    <a href="/pages/lamp/">WordPress (LEMP)</a>

    <a href="/pages/python/" aria-current="page">Python</a>

    <a href="/pages/ruby/">Ruby</a>
    <a href="/pages/erlang/">Erlang</a>
    <a href="/pages/texlive/">TeX Live</a>
  </nav>
  <div class="main">
    <div class="main-header">
      <h1>Python on wasm-posix-kernel</h1>
      <p class="subtitle">CPython 3.13.3 running inside a POSIX kernel compiled to WebAssembly</p>
      <div class="mode-toggle">
        <button id="mode-interactive" class="active">REPL</button>
        <button id="mode-batch">Script</button>
      </div>
      <div id="status" class="status" style="display:none"></div>
    </div>
    <div class="preview-area">
      <!-- Interactive REPL mode -->
      <div id="interactive-view" class="view-panel">
        <div class="controls" style="padding:0.75rem;flex-shrink:0">
          <button id="start">Start Python REPL</button>
          <button id="stop" disabled>Stop</button>
          <select id="snippets">
            <option value="">-- Insert Snippet --</option>
            <option value="hello">print("Hello, World!")</option>
            <option value="math">import math; print(f"pi = {math.pi}")</option>
            <option value="list">[x**2 for x in range(10)]</option>
            <option value="dict">d = {"a": 1, "b": 2}; print(d)</option>
            <option value="sys">import sys; print(sys.version)</option>
          </select>
        </div>
        <div class="terminal-area">
          <div id="terminal"></div>
        </div>
      </div>
      <!-- Script mode -->
      <div id="batch-view" class="view-panel hidden">
        <div class="controls" style="padding:0.75rem;flex-shrink:0">
          <select id="examples">
            <option value="">-- Load Example --</option>
            <option value="hello">Hello World</option>
            <option value="fib">Fibonacci</option>
            <option value="json">JSON Processing</option>
            <option value="collections">Collections</option>
            <option value="classes">Classes & OOP</option>
            <option value="functional">Functional Programming</option>
          </select>
          <button id="run">Run</button>
          <span class="hint">Ctrl+Enter to run</span>
        </div>
        <div class="batch-panel">
          <div>
            <h3>Python Code</h3>
            <textarea id="code">import sys
import json
import math

data = {
    "platform": sys.platform,
    "version": sys.version,
    "pi": round(math.pi, 10),
    "powers": [2**i for i in range(16)],
}

print(json.dumps(data, indent=2))
</textarea>
          </div>
          <div>
            <h3>Output</h3>
            <pre id="batch-output"></pre>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
