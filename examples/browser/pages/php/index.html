  <div class="main">
    <div class="main-header">
      <h1>PHP CLI on wasm-posix-kernel</h1>
      <p class="subtitle">PHP 8.4 CLI running inside a POSIX kernel compiled to WebAssembly</p>
      <div class="controls">
        <select id="examples">
          <option value="">-- Load Example --</option>
          <option value="hello">Hello World</option>
          <option value="fibonacci">Fibonacci</option>
          <option value="sqlite">SQLite3</option>
          <option value="json">JSON Processing</option>
          <option value="classes">Classes & OOP</option>
          <option value="arrays">Array Functions</option>
        </select>
        <button id="run">Run</button>
      </div>
      <div id="status" class="status" style="display:none"></div>
    </div>
    <div class="preview-area">
      <div class="code-panels">
        <div>
          <h3>PHP Code</h3>
          <textarea id="code">&lt;?php
echo "Hello from PHP on WebAssembly!\n";
echo "PHP version: " . PHP_VERSION . "\n";
echo "OS: " . PHP_OS . "\n";
</textarea>
        </div>
        <div>
          <h3>Output</h3>
          <pre id="output"></pre>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="./main.ts"></script>
