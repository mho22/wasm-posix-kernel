<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruby — wasm-posix-kernel</title>
  <link rel="stylesheet" href="../../lib/layout.css">
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-title">Demos</div>
    <a href="/">Simple Programs</a>
    <a href="/pages/nginx/">nginx</a>
    <a href="/pages/php/">PHP CLI</a>
    <a href="/pages/nginx-php/">nginx + PHP-FPM</a>
    <a href="/pages/mariadb/">MariaDB</a>
    <a href="/pages/redis/">Redis</a>
    <a href="/pages/wordpress/">WordPress (LEMP-but-SQLite)</a>
    <a href="/pages/lamp/">WordPress (LEMP)</a>
    <a href="/pages/shell/">Shell</a>
    <a href="/pages/python/">Python</a>
    <a href="/pages/perl/">Perl</a>
    <a href="/pages/ruby/" aria-current="page">Ruby</a>
    <a href="/pages/erlang/">Erlang</a>
    <a href="/pages/texlive/">TeX Live</a>
    <a href="/pages/doom/">DOOM</a>
  </nav>
  <div class="main">
    <div class="main-header">
      <h1>Ruby on wasm-posix-kernel</h1>
      <p class="subtitle">Ruby 3.3.6 running inside a POSIX kernel compiled to WebAssembly</p>
      <div class="mode-toggle">
        <button id="mode-interactive" class="active">REPL</button>
        <button id="mode-batch">Script</button>
      </div>
      <div id="status" class="status" style="display:none"></div>
    </div>
    <div class="preview-area">
      <!-- Interactive REPL mode -->
      <div id="interactive-view" class="view-panel">
        <div class="controls" style="padding:0.75rem;flex-shrink:0">
          <button id="start">Start Ruby REPL</button>
          <button id="stop" disabled>Stop</button>
          <select id="snippets">
            <option value="">-- Insert Snippet --</option>
            <option value="hello">puts "Hello, World!"</option>
            <option value="version">puts RUBY_VERSION</option>
            <option value="array">[1,2,3,4,5].map { |x| x ** 2 }</option>
            <option value="hash">{a: 1, b: 2}.each { |k,v| puts "#{k}=#{v}" }</option>
            <option value="block">3.times { |i| puts "iteration #{i}" }</option>
          </select>
        </div>
        <div class="terminal-area">
          <div id="terminal"></div>
        </div>
      </div>
      <!-- Script mode -->
      <div id="batch-view" class="view-panel hidden">
        <div class="controls" style="padding:0.75rem;flex-shrink:0">
          <select id="examples">
            <option value="">-- Load Example --</option>
            <option value="hello">Hello World</option>
            <option value="blocks">Blocks & Iterators</option>
            <option value="hash">Hashes & Data</option>
            <option value="file">File I/O</option>
            <option value="functional">Enumerable</option>
            <option value="oop">Classes & OOP</option>
          </select>
          <button id="run">Run</button>
          <span class="hint">Ctrl+Enter to run</span>
        </div>
        <div class="batch-panel">
          <div>
            <h3>Ruby Code</h3>
            <textarea id="code">numbers = (1..20).to_a
squares = numbers.map { |n| n ** 2 }
evens = squares.select(&:even?)

puts "Squares of 1..20:"
puts squares.join(", ")
puts
puts "Even squares:"
puts evens.join(", ")
</textarea>
          </div>
          <div>
            <h3>Output</h3>
            <pre id="batch-output"></pre>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
