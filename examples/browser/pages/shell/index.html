<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shell on wasm-posix-kernel (Browser)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    .subtitle { color: #666; margin-bottom: 1rem; font-size: 0.9rem; }
    .controls { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 1rem; }
    button, select { font-size: 0.95rem; padding: 0.4rem 0.8rem; }
    button { cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #terminal {
      background: #1e1e1e; color: #d4d4d4; padding: 1rem;
      border-radius: 4px; min-height: 400px; max-height: 600px; overflow: auto;
      white-space: pre-wrap; word-break: break-all; font-size: 0.85rem;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      cursor: text;
    }
    #terminal:focus { outline: 2px solid #4a9eff; }
    .stderr { color: #f48771; }
    .info { color: #6a9955; }
    .status { margin-bottom: 1rem; padding: 0.5rem; border-radius: 4px; font-size: 0.9rem; }
    .status.loading { background: #fff3cd; }
    .status.running { background: #d4edda; }
    .status.error { background: #f8d7da; }
    .mode-toggle { display: flex; gap: 0; margin-bottom: 1rem; }
    .mode-toggle button {
      border: 1px solid #ccc; background: #f5f5f5; padding: 0.4rem 1rem;
      cursor: pointer; font-size: 0.9rem;
    }
    .mode-toggle button:first-child { border-radius: 4px 0 0 4px; }
    .mode-toggle button:last-child { border-radius: 0 4px 4px 0; }
    .mode-toggle button.active { background: #333; color: white; border-color: #333; }
    .batch-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    textarea {
      width: 100%; min-height: 200px; font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.85rem; padding: 0.75rem; border: 1px solid #ccc; border-radius: 4px;
      resize: vertical; tab-size: 4; background: #1e1e1e; color: #d4d4d4;
    }
    #batch-output {
      background: #1e1e1e; color: #d4d4d4; padding: 1rem;
      border-radius: 4px; min-height: 200px; max-height: 400px; overflow: auto;
      white-space: pre-wrap; word-break: break-all; font-size: 0.85rem;
    }
    .hidden { display: none !important; }
    @media (max-width: 700px) {
      .batch-panel { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <h1>Shell on wasm-posix-kernel</h1>
  <nav style="margin-bottom: 1rem; padding: 0.75rem; background: #f5f5f5; border-radius: 4px;">
    <strong>Demos:</strong>
    <a href="/" style="margin-left: 0.5rem;">Simple Programs</a>
    <a href="/pages/nginx/" style="margin-left: 0.5rem;">nginx</a>
    <a href="/pages/php/" style="margin-left: 0.5rem;">PHP CLI</a>
    <a href="/pages/nginx-php/" style="margin-left: 0.5rem;">nginx + PHP-FPM</a>
    <a href="/pages/mariadb/" style="margin-left: 0.5rem;">MariaDB</a>
    <a href="/pages/wordpress/" style="margin-left: 0.5rem;">WordPress</a>
    <a href="/pages/lamp/" style="margin-left: 0.5rem;">LAMP</a>
    <a href="/pages/shell/" style="margin-left: 0.5rem; font-weight: bold;">Shell</a>
  </nav>
  <p class="subtitle">dash shell + GNU coreutils running inside a POSIX kernel compiled to WebAssembly</p>

  <div class="mode-toggle">
    <button id="mode-interactive" class="active">Interactive</button>
    <button id="mode-batch">Script</button>
  </div>

  <div id="status" class="status" style="display:none"></div>

  <!-- Interactive mode -->
  <div id="interactive-view">
    <div class="controls">
      <button id="start">Start Shell</button>
      <button id="stop" disabled>Stop</button>
      <select id="snippets">
        <option value="">-- Insert Snippet --</option>
        <option value="hello">echo hello</option>
        <option value="ls">ls /tmp</option>
        <option value="pipe">echo "hello world" | wc -c</option>
        <option value="loop">i=1; while [ $i -le 5 ]; do echo $i; i=$((i+1)); done</option>
        <option value="files">echo test > /tmp/f.txt && cat /tmp/f.txt</option>
      </select>
    </div>
    <div id="terminal" tabindex="0"></div>
  </div>

  <!-- Batch mode -->
  <div id="batch-view" class="hidden">
    <div class="controls">
      <select id="examples">
        <option value="">-- Load Example --</option>
        <option value="hello">Hello World</option>
        <option value="pipes">Pipes & Filters</option>
        <option value="loops">Loops & Arithmetic</option>
        <option value="files">File Operations</option>
        <option value="text">Text Processing</option>
        <option value="subshell">Subshells & Variables</option>
      </select>
      <button id="run">Run</button>
      <span style="color: #999; font-size: 0.8rem;">Ctrl+Enter to run</span>
    </div>
    <div class="batch-panel">
      <div>
        <h3 style="margin-bottom: 0.5rem">Shell Commands</h3>
        <textarea id="code">echo "Hello from dash on WebAssembly!"
uname -a
echo "---"
echo "Available coreutils:"
echo cat cut head tail sort uniq wc tr printf basename dirname env expr test
</textarea>
      </div>
      <div>
        <h3 style="margin-bottom: 0.5rem">Output</h3>
        <pre id="batch-output"></pre>
      </div>
    </div>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
