[global]
; Run in foreground (no daemonize)
daemonize = no
; Log to stderr
error_log = /dev/stderr
log_level = notice

[www]
; Listen on TCP for nginx FastCGI
listen = 127.0.0.1:9000

; Static process manager with 2 workers
pm = static
pm.max_children = 2

; Don't clear environment (needed for Wasm env passthrough)
clear_env = no

; Disable slow log (not supported in Wasm)
slowlog = /dev/null
request_slowlog_trace_depth = 0
