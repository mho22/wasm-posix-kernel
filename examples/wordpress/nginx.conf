daemon off;
master_process on;
worker_processes 2;
error_log stderr info;
pid /tmp/nginx.pid;

events {
    worker_connections 64;
    use poll;
}

http {
    access_log /dev/stderr;

    client_body_temp_path /tmp/nginx_client_temp;

    types {
        text/html                             html htm;
        text/css                              css;
        text/javascript                       js;
        application/javascript                js;
        application/json                      json;
        image/png                             png;
        image/jpeg                            jpg jpeg;
        image/gif                             gif;
        image/svg+xml                         svg;
        image/x-icon                          ico;
        application/octet-stream              bin;
    }
    default_type application/octet-stream;

    server {
        listen 8080;
        server_name localhost;

        # Root is set to the WordPress directory at runtime via
        # sed replacement of WORDPRESS_ROOT in serve-nginx.ts
        root WORDPRESS_ROOT;

        # All requests go to PHP-FPM via the router script.
        # The router serves static files directly and routes PHP/WordPress
        # requests appropriately. This avoids needing PCRE (regex locations)
        # in the nginx build.
        location / {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME ROUTER_SCRIPT;
            fastcgi_param DOCUMENT_ROOT $document_root;
            fastcgi_param DOCUMENT_URI $document_uri;
            fastcgi_param QUERY_STRING $query_string;
            fastcgi_param REQUEST_METHOD $request_method;
            fastcgi_param CONTENT_TYPE $content_type;
            fastcgi_param CONTENT_LENGTH $content_length;
            fastcgi_param REQUEST_URI $request_uri;
            fastcgi_param SERVER_PROTOCOL $server_protocol;
            fastcgi_param SERVER_PORT $server_port;
            fastcgi_param SERVER_NAME $server_name;
            fastcgi_param HTTP_HOST $http_host;
            fastcgi_param REDIRECT_STATUS 200;
        }
    }
}
