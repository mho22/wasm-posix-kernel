# Per-library manifest for libxml2. See docs/package-management.md.
#
# libxml2 depends on zlib for optional compressed-input support (the
# `--with-zlib` configure path). Only zlib is declared as a build-time
# dep in legacy; libxml2's other optional deps (lzma, icu, python, etc.)
# are all disabled via `--without-*` in build-libxml2.sh.

kind = "library"

name = "libxml2"
version = "2.13.8"
revision = 1
depends_on = ["zlib@1.3.1"]
# Opt into wasm64 because PHP depends on it. See
# memory/wasm64-build-policy.md.
arches = ["wasm32", "wasm64"]

[source]
url = "https://download.gnome.org/sources/libxml2/2.13/libxml2-2.13.8.tar.xz"
sha256 = "277294cb33119ab71b2bc81f2f445e9bc9435b893ad15bb2cd2b0e859a0ee84a"

[license]
spdx = "MIT"
url = "https://gitlab.gnome.org/GNOME/libxml2/-/blob/v2.13.8/Copyright"

[outputs]
# Note: the in-tree build installs headers directly under
# include/libxml/ rather than upstream's include/libxml2/libxml/ —
# consumers link with `-I$prefix/include` + `#include <libxml/...>`.
# See build-libxml2.sh for context (libtool mishandles the wasm .o
# naming, so the script compiles + installs by hand).
libs = ["lib/libxml2.a"]
headers = ["include/libxml"]
pkgconfig = ["lib/pkgconfig/libxml-2.0.pc"]
[binary.wasm32]
archive_url = "https://github.com/brandonpayton/wasm-posix-kernel/releases/download/binaries-abi-v6/libxml2-2.13.8-rev1-abi6-wasm32-36641b15.tar.zst"
archive_sha256 = "6cecb5947fe9a9b219f8e1c790e8718f1032a3499c6f5335726269f70a93479e"
[binary.wasm64]
archive_url = "https://github.com/brandonpayton/wasm-posix-kernel/releases/download/binaries-abi-v6/libxml2-2.13.8-rev1-abi6-wasm64-80a9b06b.tar.zst"
archive_sha256 = "91e6aa3fb47b9155f32c89ffc8c9207654003f3df4ee1eadbe33452a1427f24a"
