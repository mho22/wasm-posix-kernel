# Per-program manifest for ScummVM. See docs/package-management.md and
# docs/plans/2026-04-29-scummvm-design.md.
#
# ScummVM is a cross-platform adventure-game engine. We build the
# `sky` + `queen` + `lure` subset (the engines that pair with
# freeware-redistributable games — Beneath a Steel Sky, Flight of the
# Amazon Queen, Lure of the Temptress).
#
# Backend = sdl, video/audio/input via the project's SDL2 (sibling task)
# which speaks /dev/fb0, /dev/dsp, and /dev/input/mice.

kind = "program"

name = "scummvm"
version = "2.8.0"
revision = 1
depends_on = [
    "zlib@1.3.1",
    "libpng@1.6.43",
    "freetype@2.13.2",
    # SDL2 dependency name TBD — pinned at consumer-merge time once the
    # SDL2 task lands and the package name + version is finalized.
    # "sdl2@<version>",
]
arches = ["wasm32"]

[source]
url = "https://github.com/scummvm/scummvm/archive/refs/tags/v2.8.0.tar.gz"
# sha256 to be filled at first reproducible build (the GitHub-generated
# tarball sha can shift on re-roll for older tags; treat as variable
# until verified against a publish run).
sha256 = ""

[license]
spdx = "GPL-3.0-or-later"
url = "https://github.com/scummvm/scummvm/blob/master/COPYING"

[[outputs]]
name = "scummvm"
wasm = "scummvm.wasm"

# Binary archive published after first successful build. Until then,
# the resolver builds from source on demand.
# [binary.wasm32]
# archive_url = "https://github.com/mho22/wasm-posix-kernel/releases/download/binaries-abi-v6-2026-XX-XX/scummvm-2.8.0-rev1-abi6-wasm32-*.tar.zst"
# archive_sha256 = "<filled at publish>"
