kind = "program"
name = "wordpress"
version = "6.8"
revision = 1
kernel_abi = 7
# build-wp-vfs-image.ts:
#   - uses `resolveBinary("programs/<x>.wasm")` (strict) for
#     dash/nginx/php-fpm/coreutils/sed
#   - reads `examples/wordpress/wordpress/` (the WordPress PHP source,
#     downloaded by examples/wordpress/setup.sh — invoked from
#     build-wordpress.sh; not a registry package)
#   - calls `addDinitInit(...)` which calls `resolveDinitBinaries()`
#     (strict — throws if neither tryResolveBinary nor the source-tree
#     path resolves) to bake the PID-1 init system. The demo boots from
#     /sbin/dinit; without dinit baked in the VFS is unbootable.
depends_on = [
    "dash@0.5.12",
    "nginx@1.24.0",
    "php@8.3.2",
    "coreutils@9.6",
    "sed@4.9",
    "dinit@0.19.4",
]

[source]
url = "https://wordpress.org/wordpress-6.8.tar.gz"
sha256 = "f7dbedc423ddb3f2f3e98e9140f1720bfd6d4a8f4873c85da2e62f6a078de10a"

[license]
spdx = "GPL-2.0-or-later"
url = "https://wordpress.org/about/gpl/"

[build]
script_path = "examples/libs/wordpress/build-wordpress.sh"
repo_url    = "https://github.com/wasm-posix-kernel/wasm-posix-kernel.git"

[[outputs]]
name = "wordpress"
wasm = "wordpress.vfs"
[binary]
archive_url = "https://github.com/brandonpayton/wasm-posix-kernel/releases/download/binaries-abi-v6/wordpress-6.8-rev1-abi6-wasm32-31113b92.tar.zst"
archive_sha256 = "8e8b54013d801f5135a2431084d6a962b12c86bef301d3b3fbda1da9aeee5b73"
