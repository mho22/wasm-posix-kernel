kind = "program"
name = "curl"
version = "8.11.1"
revision = 1
# curl is a side-output of libcurl's build (libcurl's autoconf produces
# both lib/libcurl.a and src/curl). Keep this manifest aligned with
# libcurl's source so build-curl.sh — which delegates to
# build-libcurl.sh — finds a pre-generated `configure` script. The
# github "archive/refs/tags/" tarball does NOT contain one (autoconf
# runs at release time, not in git); the curl.se release tarball does.
depends_on = []

[source]
url = "https://curl.se/download/curl-8.11.1.tar.xz"
sha256 = "c7ca7db48b0909743eaef34250da02c19bc61d4f1dcedd6603f109409536ab56"

[license]
spdx = "curl"
url = "https://github.com/curl/curl/blob/master/COPYING"

[[outputs]]
name = "curl"
wasm = "curl.wasm"
[binary]
archive_url = "https://github.com/brandonpayton/wasm-posix-kernel/releases/download/binaries-abi-v6/curl-8.11.1-rev1-abi6-wasm32-dc1febdf.tar.zst"
archive_sha256 = "97658327cf46462c0ba799f3c4f424d2dd5cb07f6f757d7caa38e3b9c9c7e438"
