# In-tree implementation, not the upstream lsof. The source lives at
# examples/lsof.c and reads this kernel's /proc to enumerate open
# file descriptors. Versioned alongside the kernel, so the source
# URL is the project repo and the sha256 is a placeholder (the source
# is on-disk in the repo, not fetched).
